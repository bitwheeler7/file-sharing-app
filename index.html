<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Sharing App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .section {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 25px;
            background: #f8f9fa;
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f3ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebf8;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-area p {
            color: #666;
            margin-bottom: 10px;
        }

        .upload-area span {
            color: #667eea;
            font-weight: bold;
        }

        #fileInput {
            display: none;
        }

        .file-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .file-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .file-item:hover {
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
            transform: translateX(5px);
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .file-size {
            color: #999;
            font-size: 0.9em;
        }

        .file-actions {
            display: flex;
            gap: 10px;
            margin-left: 10px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        button.delete {
            background: #e74c3c;
        }

        button.delete:hover {
            background: #c0392b;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .status {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 30px 0;
        }

        .empty-state p {
            font-size: 1.1em;
        }

        .emoji {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .share-link-section {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 6px;
            display: none;
        }

        .share-link-section.active {
            display: block;
        }

        .share-link-section input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 0.9em;
        }

        .share-link-section button {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📤 File Sharing App</h1>
            <p>Share files instantly with local storage</p>
        </div>

        <div class="content">
            <!-- Upload Section -->
            <div class="section">
                <h2>📁 Upload Files</h2>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📂</div>
                    <p>Drag and drop files here</p>
                    <p>or <span>click to browse</span></p>
                </div>
                <input type="file" id="fileInput" multiple>
                <div class="progress-bar" id="progressBar" style="display: none;">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="status" id="status"></div>
            </div>

            <!-- Files List Section -->
            <div class="section">
                <h2>📋 Shared Files</h2>
                <div class="file-list" id="fileList">
                    <div class="empty-state">
                        <div class="emoji">📭</div>
                        <p>No files yet. Upload one to get started!</p>
                    </div>
                </div>
                <div class="share-link-section" id="shareLinkSection">
                    <h3 style="margin-bottom: 10px; color: #333;">Share Link</h3>
                    <input type="text" id="shareLink" readonly>
                    <button onclick="copyToClipboard()">📋 Copy Link</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const status = document.getElementById('status');
        const shareLink = document.getElementById('shareLink');
        const shareLinkSection = document.getElementById('shareLinkSection');

        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            if (files.length === 0) return;

            Array.from(files).forEach(file => {
                uploadFile(file);
            });
        }

        function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            progressBar.style.display = 'block';
            status.textContent = `Uploading ${file.name}...`;
            status.className = 'status';

            const xhr = new XMLHttpRequest();

            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percentComplete = (e.loaded / e.total) * 100;
                    progressFill.style.width = percentComplete + '%';
                }
            });

            xhr.addEventListener('load', () => {
                progressBar.style.display = 'none';
                progressFill.style.width = '0%';

                if (xhr.status === 200) {
                    const response = JSON.parse(xhr.responseText);
                    if (response.success) {
                        showStatus(`✅ ${file.name} uploaded successfully!`, 'success');
                        loadFiles();
                    } else {
                        showStatus(`❌ Error: ${response.message}`, 'error');
                    }
                } else {
                    showStatus('❌ Upload failed. Try again.', 'error');
                }
            });

            xhr.addEventListener('error', () => {
                progressBar.style.display = 'none';
                showStatus('❌ Network error. Try again.', 'error');
            });

            xhr.open('POST', 'upload.php');
            xhr.send(formData);
        }

        function loadFiles() {
            fetch('list.php')
                .then(response => response.json())
                .then(data => {
                    if (data.files.length === 0) {
                        fileList.innerHTML = `
                            <div class="empty-state">
                                <div class="emoji">📭</div>
                                <p>No files yet. Upload one to get started!</p>
                            </div>
                        `;
                        shareLinkSection.classList.remove('active');
                    } else {
                        fileList.innerHTML = '';
                        data.files.forEach(file => {
                            const fileItem = document.createElement('div');
                            fileItem.className = 'file-item';
                            fileItem.innerHTML = `
                                <div class="file-info">
                                    <div class="file-name">📄 ${file.name}</div>
                                    <div class="file-size">${formatFileSize(file.size)}</div>
                                </div>
                                <div class="file-actions">
                                    <a href="download.php?file=${encodeURIComponent(file.name)}" style="text-decoration: none;">
                                        <button>⬇️ Download</button>
                                    </a>
                                    <button onclick="deleteFile('${file.name}')" class="delete">🗑️ Delete</button>
                                </div>
                            `;
                            fileList.appendChild(fileItem);
                        });

                        // Show share link
                        const currentUrl = window.location.href.split('?')[0];
                        shareLink.value = currentUrl;
                        shareLinkSection.classList.add('active');
                    }
                })
                .catch(error => {
                    console.error('Error loading files:', error);
                    fileList.innerHTML = `
                        <div class="empty-state">
                            <div class="emoji">❌</div>
                            <p>Error loading files.</p>
                        </div>
                    `;
                });
        }

        function deleteFile(filename) {
            if (confirm(`Are you sure you want to delete "${filename}"?`)) {
                fetch('delete.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file: filename })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showStatus(`✅ ${filename} deleted!`, 'success');
                        loadFiles();
                    } else {
                        showStatus(`❌ Error: ${data.message}`, 'error');
                    }
                })
                .catch(error => {
                    console.error('Error deleting file:', error);
                    showStatus('❌ Delete failed.', 'error');
                });
            }
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status ${type}`;
            setTimeout(() => {
                status.className = 'status';
            }, 3000);
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        function copyToClipboard() {
            shareLink.select();
            document.execCommand('copy');
            showStatus('✅ Link copied to clipboard!', 'success');
        }

        // Load files on page load
        loadFiles();
        setInterval(loadFiles, 5000); // Refresh every 5 seconds
    </script>
</body>
</html>
